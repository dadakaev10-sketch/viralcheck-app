<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="42" fill="url(#g)"/>
  <!-- Sparkle / star shape -->
  <g transform="translate(96,96)">
    <!-- Vertical bar -->
    <rect x="-9" y="-52" width="18" height="104" rx="9" fill="white" opacity="0.95"/>
    <!-- Horizontal bar -->
    <rect x="-52" y="-9" width="104" height="18" rx="9" fill="white" opacity="0.95"/>
    <!-- Diagonal top-left to bottom-right -->
    <rect x="-6" y="-38" width="12" height="76" rx="6" fill="white" opacity="0.6" transform="rotate(45)"/>
    <!-- Diagonal top-right to bottom-left -->
    <rect x="-6" y="-38" width="12" height="76" rx="6" fill="white" opacity="0.6" transform="rotate(-45)"/>
  </g>
</svg>
